name: my_rabbit
description: A fun candy-collecting game for kids featuring a cute growing bunny!
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flame: ^1.14.0
  flame_audio: ^2.1.0
  google_mobile_ads: ^4.0.0
  shared_preferences: ^2.2.2
  provider: ^6.1.1
  audioplayers: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/audio/
